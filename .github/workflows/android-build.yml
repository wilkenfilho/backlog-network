name: Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependências
        run: npm install

      - name: Aplicar patches de compatibilidade
        run: |
          node scripts/fix-expo-modules-core.js
          node scripts/patch-rn-jdk.js

      - name: Remover autolinking aninhado conflitante
        run: |
          NESTED="node_modules/expo/node_modules/expo-modules-autolinking"
          [ -d "$NESTED" ] && rm -rf "$NESTED" && echo "Removed" || echo "Not found"

      - name: Patch expo-modules-core build.gradle
        run: |
          BUILD_GRADLE="node_modules/expo-modules-core/android/build.gradle"
          # Mostra estado atual
          echo "=== Últimas 20 linhas do build.gradle ==="
          tail -20 "$BUILD_GRADLE"
          # Remove qualquer suppress antigo
          python3 -c "
          import re
          with open('$BUILD_GRADLE', 'r') as f:
              content = f.read()
          # Remove todos os patches anteriores
          content = re.sub(r'\n// === .*?Patch.*?\n.*?suppressKotlinVersionCompatibilityCheck.*?\n.*?\}\n.*?\}\n', '', content, flags=re.DOTALL)
          content = re.sub(r'\n// === CI Patch.*', '', content, flags=re.DOTALL)
          # Adiciona patch correto
          patch = '''

// === CI Patch v3 ===
tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
  kotlinOptions {
    freeCompilerArgs += [\"-P\", \"plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=1.9.25\"]
  }
}
'''
          with open('$BUILD_GRADLE', 'w') as f:
              f.write(content + patch)
          print('Patch aplicado com sucesso')
          "
          echo "=== Últimas 15 linhas após patch ==="
          tail -15 "$BUILD_GRADLE"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Permissao gradlew
        run: chmod +x android/gradlew

      - name: Build APK Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --info 2>&1 | grep -E "error:|FAILED|Caused by:|compileDebugKotlin|e:.*\.kt" | head -80

      - name: Build APK Debug (real)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
