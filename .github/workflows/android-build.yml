name: Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependências
        run: npm install

      - name: Aplicar patches de compatibilidade
        run: |
          node scripts/fix-expo-modules-core.js
          node scripts/patch-rn-jdk.js

      - name: Remover autolinking aninhado conflitante
        run: |
          NESTED="node_modules/expo/node_modules/expo-modules-autolinking"
          [ -d "$NESTED" ] && rm -rf "$NESTED" && echo "Removed" || echo "Not found"

      - name: Patch expo-modules-core - forcar Kotlin 1.9.25 e suppress correto
        run: |
          BUILD_GRADLE="node_modules/expo-modules-core/android/build.gradle"
          # Remove linhas antigas do suppress que possam ter sido adicionadas
          grep -v "suppressKotlinVersionCompatibilityCheck" "$BUILD_GRADLE" > /tmp/bg_clean.gradle || true
          grep -v "CI Patch\|=== Patch" /tmp/bg_clean.gradle > /tmp/bg_final.gradle || true
          cp /tmp/bg_final.gradle "$BUILD_GRADLE"
          # Adiciona suppress com versao correta 1.9.25
          cat >> "$BUILD_GRADLE" << 'ENDPATCH'

          // === CI Patch ===
          tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
            kotlinOptions {
              freeCompilerArgs += ["-P", "plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=1.9.25"]
            }
          }
          ENDPATCH
          echo "Patch aplicado"
          tail -10 "$BUILD_GRADLE"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Permissao gradlew
        run: chmod +x android/gradlew

      - name: Build APK Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
