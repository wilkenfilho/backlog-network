name: Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependências
        run: npm install

      - name: Aplicar patch expo-modules-core (Kotlin 2.x compat)
        run: node scripts/fix-expo-modules-core.js

      - name: Aplicar patch react-native JdkConfiguratorUtils
        run: node scripts/patch-rn-jdk.js

      - name: Remover autolinking aninhado conflitante
        run: |
          NESTED="node_modules/expo/node_modules/expo-modules-autolinking"
          if [ -d "$NESTED" ]; then
            echo "Removendo $NESTED"
            rm -rf "$NESTED"
          else
            echo "Sem autolinking aninhado, OK"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Permissão gradlew
        run: chmod +x android/gradlew

      - name: Build APK Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
