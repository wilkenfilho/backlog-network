name: Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependencias
        run: npm install

      - name: Patch expo-modules-core e react-native
        run: |
          node scripts/fix-expo-modules-core.js
          node scripts/patch-rn-jdk.js

      - name: Remover autolinking aninhado
        run: |
          NESTED="node_modules/expo/node_modules/expo-modules-autolinking"
          [ -d "$NESTED" ] && rm -rf "$NESTED" && echo "Removed" || echo "Not found"

      - name: Patch Compose Kotlin compat
        run: python3 scripts/patch-compose-compat.py

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Permissao gradlew
        run: chmod +x android/gradlew

      - name: Build APK Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
